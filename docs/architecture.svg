<svg viewBox="0 0 1000 480" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1000" height="480" fill="#0b1220"/>

  <!-- Device box -->
  <rect x="30" y="150" width="200" height="180" rx="12" fill="#12213a" stroke="#2a3f66"/>
  <text x="130" y="180" fill="#e8edf7" font-size="14" font-weight="bold" text-anchor="middle">Windows Laptop</text>
  <text x="130" y="205" fill="#8fa1c2" font-size="11" text-anchor="middle">(or Linux / Raspberry Pi)</text>
  <text x="45" y="235" fill="#cdd9f0" font-size="11">• CPU %</text>
  <text x="45" y="255" fill="#cdd9f0" font-size="11">• RAM used/total (GB)</text>
  <text x="45" y="275" fill="#cdd9f0" font-size="11">• Disk used/total (GB)</text>
  <text x="45" y="295" fill="#cdd9f0" font-size="11">• Uptime (hours)</text>
  <text x="45" y="315" fill="#cdd9f0" font-size="11">• Temperature (optional)</text>

  <!-- collector arrow -->
  <line x1="230" y1="240" x2="300" y2="240" stroke="#4fd1c5" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="265" y="230" fill="#8fa1c2" font-size="10" text-anchor="middle">psutil</text>

  <!-- App box -->
  <rect x="300" y="120" width="220" height="240" rx="12" fill="#12213a" stroke="#4fd1c5" stroke-width="2"/>
  <text x="410" y="150" fill="#e8edf7" font-size="15" font-weight="bold" text-anchor="middle">Seaker-Alert-App</text>
  <text x="410" y="168" fill="#8fa1c2" font-size="10" text-anchor="middle">FastAPI (Python, Docker)</text>

  <rect x="318" y="182" width="184" height="40" rx="6" fill="#0f1830" stroke="#2a3f66"/>
  <text x="410" y="206" fill="#cdd9f0" font-size="11" text-anchor="middle">Collector loop (5s)</text>

  <rect x="318" y="230" width="184" height="40" rx="6" fill="#0f1830" stroke="#2a3f66"/>
  <text x="410" y="254" fill="#cdd9f0" font-size="11" text-anchor="middle">Alert engine (thresholds)</text>

  <rect x="318" y="278" width="184" height="40" rx="6" fill="#0f1830" stroke="#2a3f66"/>
  <text x="410" y="302" fill="#cdd9f0" font-size="11" text-anchor="middle">REST + WebSocket API</text>

  <!-- DB box -->
  <ellipse cx="410" cy="410" rx="90" ry="26" fill="#241a3a" stroke="#7a5cff"/>
  <text x="410" y="415" fill="#e8edf7" font-size="12" text-anchor="middle">SQLite (metrics + thresholds)</text>
  <line x1="410" y1="360" x2="410" y2="384" stroke="#7a5cff" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="395" y1="384" x2="395" y2="360" stroke="#7a5cff" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Alerts box -->
  <line x1="520" y1="200" x2="600" y2="200" stroke="#ef5b5b" stroke-width="2" marker-end="url(#arrowRed)"/>
  <rect x="600" y="150" width="200" height="100" rx="12" fill="#2a1620" stroke="#ef5b5b"/>
  <text x="700" y="178" fill="#ffb4b4" font-size="13" font-weight="bold" text-anchor="middle">Alerts / Notifications</text>
  <text x="700" y="200" fill="#e8c9c9" font-size="11" text-anchor="middle">Telegram bot</text>
  <text x="700" y="218" fill="#e8c9c9" font-size="11" text-anchor="middle">Email (SMTP)</text>
  <text x="700" y="236" fill="#e8c9c9" font-size="11" text-anchor="middle">On-screen banner</text>

  <!-- Dashboard box -->
  <line x1="520" y1="290" x2="600" y2="290" stroke="#3ecf8e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="600" y="270" width="200" height="100" rx="12" fill="#132a20" stroke="#3ecf8e"/>
  <text x="700" y="298" fill="#a8f0cf" font-size="13" font-weight="bold" text-anchor="middle">Web Dashboard</text>
  <text x="700" y="320" fill="#cdeede" font-size="11" text-anchor="middle">Live metrics (WebSocket)</text>
  <text x="700" y="338" fill="#cdeede" font-size="11" text-anchor="middle">Historical charts</text>
  <text x="700" y="356" fill="#cdeede" font-size="11" text-anchor="middle">Threshold configuration</text>

  <!-- User -->
  <line x1="800" y1="200" x2="880" y2="260" stroke="#4fd1c5" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="800" y1="320" x2="880" y2="280" stroke="#4fd1c5" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="920" cy="270" r="50" fill="#0f1830" stroke="#4fd1c5" stroke-width="2"/>
  <text x="920" y="266" fill="#e8edf7" font-size="13" font-weight="bold" text-anchor="middle">User</text>
  <text x="920" y="284" fill="#8fa1c2" font-size="9" text-anchor="middle">remote dashboard URL</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#4fd1c5"/></marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#7a5cff"/></marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#ef5b5b"/></marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#3ecf8e"/></marker>
  </defs>
</svg>
